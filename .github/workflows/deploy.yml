name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-prod:
    name: Deploy (Production)
    # main への push で本番 (sfscrim.sf6.workers.dev) にデプロイ。
    # vars.DEPLOY_ENABLED = "true" + secrets が揃っていることが条件。
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (OpenNext for Cloudflare)
        run: pnpm exec opennextjs-cloudflare build
      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  deploy-dev:
    name: Deploy (Development)
    # develop への push で開発環境 (sfscrim-dev.sf6.workers.dev) にデプロイ。
    # 本番 D1 とは別の sfscrim-db-dev に向くので、データ汚染なし。
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (OpenNext for Cloudflare)
        run: pnpm exec opennextjs-cloudflare build
      - name: Deploy to Cloudflare Workers (development)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env development

  deploy-preview:
    name: Deploy (Preview)
    # PR ごとに versions upload で preview URL を発行。
    # fork からの PR は secrets を取得できず確実に fail するので除外。
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (OpenNext for Cloudflare)
        run: pnpm exec opennextjs-cloudflare build
      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.preview.outputs.deployment-url }}`;
            const body = url
              ? `🚀 Preview deployed: ${url}`
              : `🚀 Preview version uploaded. Check Cloudflare dashboard for the URL.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
